<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentoria Acadêmica</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#cdbaa6',
            secondary: '#6b5d52', // Warm Dark Brown
            dark: '#4a4a4a',
            neutral: '#ffffff',
            surface: '#ffffff',
            'surface-hover': '#faf9f8',
            'functional': '#5D707F', // Blue-Grey for functional elements
            'premium-border': 'rgba(205, 186, 166, 0.3)',
            'card-border': 'rgba(255, 255, 255, 0.8)',
            'accent': '#Cca47c',
            'dark-bg': '#0c0a09',
            'dark-card': '#1c1917',
            'dark-surface': '#292524',
          },
          fontFamily: {
            sans: ['Lato', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
          },
          backgroundImage: {
            'soft-paper': 'linear-gradient(to bottom, #F5F2EF 0%, #E8E2D9 100%)', // Deeper for better contrast
          },
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(142, 125, 111, 0.1)',
            'card': '0 8px 30px -6px rgba(140, 115, 100, 0.08), 0 0 1px rgba(140, 115, 100, 0.1)', // Keeping for backward compat
            'elevation-1': '0 2px 4px rgba(140, 115, 100, 0.05)', // Tertiary
            'elevation-2': '0 8px 20px -4px rgba(140, 115, 100, 0.1)', // Secondary
            'elevation-3': '0 20px 40px -10px rgba(140, 115, 100, 0.15)', // Primary
            'level-1': '0 2px 10px rgba(140, 115, 100, 0.08)', // Small items
            'level-2': '0 12px 40px -8px rgba(140, 115, 100, 0.12), 0 4px 16px -4px rgba(140, 115, 100, 0.08)', // Main containers
            'level-3': '0 25px 60px -12px rgba(90, 70, 60, 0.2)', // Modals/Floating
            'inner-depth': 'inset 0 4px 12px -4px rgba(140, 115, 100, 0.08)', // Large surfaces
            'inner-light': 'inset 0 1px 0 rgba(255, 255, 255, 0.8)',
            'dark-soft': '0 10px 30px -10px rgba(0, 0, 0, 0.8)',
            'dark-glow': '0 0 15px rgba(205, 186, 166, 0.1)',
          },
          keyframes: {
            shimmer: {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' }
            },
            'fade-up': {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          },
          animation: {
            shimmer: 'shimmer 1.5s infinite linear',
            'fade-up': 'fade-up 0.8s ease-out forwards',
          },
          transitionTimingFunction: {
            'bezier-custom': 'cubic-bezier(0.22, 1, 0.36, 1)',
          }
        }
      }
    }
  </script>
  <style>
    body {
      /* Default light mode - Greyish Sand */
      background-color: #F0EEE9;
      color: #4a4a4a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background-color 0.5s cubic-bezier(0.22, 1, 0.36, 1), color 0.5s ease;
    }

    /* Dark mode override */
    .dark body {
      background-color: #0c0a09;
      color: #e7e5e4;
    }

    /* Custom scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #e0d8d0;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #cdbaa6;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #44403c;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #57534e;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
